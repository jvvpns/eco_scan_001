<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoScan - Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f0fdf4;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        background: white;
        border-radius: 24px;
        padding: 40px 32px;
        text-align: center;
        max-width: 320px;
        width: 100%;
        box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      }
      .icon { font-size: 56px; margin-bottom: 16px; }
      h1 { color: #111827; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
      p  { color: #6b7280; font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
      button {
        background: #16a34a;
        color: white;
        border: none;
        border-radius: 14px;
        padding: 14px 28px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
      }
      button:active { transform: scale(0.97); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">🌿</div>
      <h1>You're Offline</h1>
      <p>EcoScan needs an internet connection to classify waste and sync your EcoPoints. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Try Again</button>
    </div>
  </body>
</html>
